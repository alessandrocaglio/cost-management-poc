# Default values for cost-management-redux

replicaCount: 1

image:
  repository: quay.io/acaglio/cost-management-redux
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 8000

route:
  enabled: true
  host: ""
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Red Hat Cost Management API credentials Secret.
# create: false (default) — Secret must exist before install (Sealed Secrets / Vault / manual).
# create: true            — Helm creates the Secret from costClientId / costClientSecret below.
#                           Not recommended for production; use only for quick testing.
secrets:
  name: cost-management-credentials
  create: false
  costClientId: ""
  costClientSecret: ""

config:
  cacheTtlSeconds: 900
  ssoTokenUrl: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
  costApiBaseUrl: "https://console.redhat.com/api/cost-management/v1"
  corsOrigins: "*"

extraEnv: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""  # leave empty to disable memory-based scaling

nodeSelector: {}

tolerations: []

affinity: {}
