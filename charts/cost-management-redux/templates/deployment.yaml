apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cost-management-redux.fullname" . }}
  labels:
    {{- include "cost-management-redux.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cost-management-redux.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cost-management-redux.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cost-management-redux.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: COST_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: COST_CLIENT_ID
        - name: COST_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ .Values.secrets.name }}
              key: COST_CLIENT_SECRET
        - name: CACHE_TTL_SECONDS
          value: {{ .Values.config.cacheTtlSeconds | quote }}
        - name: SSO_TOKEN_URL
          value: {{ .Values.config.ssoTokenUrl | quote }}
        - name: COST_API_BASE_URL
          value: {{ .Values.config.costApiBaseUrl | quote }}
        - name: CORS_ORIGINS
          value: {{ .Values.config.corsOrigins | quote }}
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
{{- with .Values.extraEnv }}          
{{- toYaml . | nindent 8 }}
{{- end }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
